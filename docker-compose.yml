services:
  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: shap_web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./storage/tasks:/var/www/html/storage/tasks
    depends_on:
      - db
      - python-worker
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: app
      DB_USERNAME: app
      DB_PASSWORD: app
      TASKS_DIR: /var/www/html/storage/tasks
      PYTHON_WORKER_HOST: python-worker

  python-worker:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    container_name: shap_python_worker
    restart: unless-stopped
    volumes:
      - ./:/app
      - ./storage/tasks:/app/storage/tasks
      - ./models:/app/models
      - ./dataset:/app/dataset
    working_dir: /app
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: app
      DB_USERNAME: app
      DB_PASSWORD: app
      TASKS_DIR: /app/storage/tasks
      MODELS_DIR: /app/models
      DATASET_DIR: /app/dataset
    depends_on:
      - db
    command: ["python", "worker.py"]

  db:
    image: mysql:8.0
    container_name: shap_db
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

volumes:
  db_data:
